        async function updateImageCard(card, img, index) {
            if (!card) return;
            
            // 如果已清空，不再更新卡片
            if (isCleared) {
                return;
            }

            // 如果卡片已被取消，不再更新
            if (card.classList.contains('cancelled')) {
                console.log('卡片已被取消，跳过更新');
                return;
            }

            const previewDiv = card.querySelector('.image-card-preview');
            const titleDiv = card.querySelector('.image-card-title');
            const cardId = card.dataset.cardId;
            const generationDuration = endGenerationTimer(cardId?.toString());

            card.classList.remove('loading');
            card.classList.add('completed');

            const timeDiv = card.querySelector('.generation-time');
            if (timeDiv) {
                timeDiv.textContent = `| 生成耗时: ${generationDuration.toFixed(1)}秒`;
                timeDiv.style.color = 'var(--success)';
            }

            const imageTitle = titleDiv ? titleDiv.textContent : `印花提取 #${String(globalImageCounter).padStart(3, '0')}`;

            // 直接显示图片，不等待预加载
            previewDiv.innerHTML = `
                <img src="${img.url}" alt="生成的图片" onload="this.style.opacity='1'" onerror="this.style.opacity='0.5'" style="opacity: 0; transition: opacity 0.3s ease;">
                <button class="image-card-delete" onclick="deleteImage('${img.url}')" title="删除"></button>
                <div class="image-card-overlay">
                    <div class="image-card-actions">
                        <button class="card-action-btn" onclick="downloadImage('${img.url}')">下载</button>
                        <button class="card-action-btn" onclick="favoriteImage('${img.url}', '${imageTitle}', '1:1')">收藏</button>
                    </div>
                </div>
            `;

            // 后台预加载缓存，不阻塞显示
            preloadImage(img.url).catch(() => {});

            setTimeout(() => {
                card.classList.remove('completed');
            }, 500);

            const imageData = {
                url: img.url,
                title: imageTitle,
                ratio: '1:1',
                timestamp: new Date().toLocaleString('zh-CN')
            };

            const isAlreadyExists = allImages.some(existingImg => existingImg.url === img.url);
            if (!isAlreadyExists) {
                allImages.unshift(imageData);
                localStorageCache.markDirty(STORAGE_KEY_ALL);
            }

            showToast('印花提取完成！', 'success');
        }

        // ==================== 生成按钮 ====================
        const generateBtn = document.getElementById('generateBtn');
        generateBtn.addEventListener('click', async () => {
            if (!uploadedImage) {
                showToast('请上传服装图片', 'error');
                return;
            }

            const prompt = document.getElementById('patternPrompt')?.value?.trim() || '';
            const modelTypeBtn = document.querySelector('#modelType .option-btn.active');
            const modelType = modelTypeBtn?.dataset?.model || 'domestic';

            // 检查API密钥是否已加载（页面加载时应该已完成）
            if (!apiKeysLoaded) {
                showToast('配置正在加载中，请稍后再试', 'warning');
                return;
            }

            // 检查API密钥是否已设置
            if (modelType === 'domestic' && !userApiKeys.doubao) {
                showToast('豆包API密钥未设置，请联系管理员', 'error');
                return;
            }
            if (modelType === 'foreign' && !userApiKeys.google) {
                showToast('谷歌API密钥未设置，请联系管理员', 'error');
                return;
            }

            const qualityBtn = document.querySelector('#patternQuality .option-btn.active');
            const ratioBtn = document.querySelector('#patternRatio .option-btn.active');

            const imageCount = 1;

            showToast('正在提取印花图案...', 'success');

            const taskCards = [];
            const card = createImageCard(1, 1, ratioBtn?.dataset?.ratio || '1:1');
            taskCards.push(card);

            setTimeout(async () => {
                try {
                    const params = {
                        prompt: prompt,
                        quality: qualityBtn?.dataset?.quality || '4k',
                        ratio: ratioBtn?.dataset?.ratio || '1:1',
                        referenceImage: uploadedImage.src,
                        imageCount: imageCount,
                        taskCards: taskCards,
                        modelType: modelType
                    };

                    const result = await generationQueue.addTask(params);
                    
                    if (result.data && result.data.length > 0) {
                        showToast('印花提取完成！', 'success');
                    } else {
                        showToast('提取失败，请重试', 'error');
                    }
                } catch (error) {
                    console.error('提取失败:', error);
                    showToast(error.message || '提取失败，请重试', 'error');
                    taskCards.forEach(card => updateImageCardError(card, error.message));
                }
            }, 100);
        });

        // 更新卡片为错误状态
        function updateImageCardError(card, errorMessage) {
            if (!card) return;

            card.classList.remove('loading');
            card.classList.add('error');

            const previewDiv = card.querySelector('.image-card-preview');
            const timeDiv = card.querySelector('.generation-time');

            if (timeDiv) {
                timeDiv.textContent = '| 生成失败';
                timeDiv.style.color = 'var(--danger)';
            }

            if (previewDiv) {
                previewDiv.innerHTML = `
                    <div class="loading-content">
                        <div style="font-size: 32px; margin-bottom: 8px;">❌</div>
                        <div class="loading-text">生成失败</div>
                        <div class="loading-progress" style="font-size: 12px; color: var(--text-secondary);">${errorMessage || '请重试'}</div>
                    </div>
                `;
            }
        }

        // ==================== 下载功能 ====================
        async function downloadImage(url) {
            try {
                showToast('开始下载...', 'success');
                const response = await fetch(url, { method: 'GET', mode: 'cors' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const arrayBuffer = await response.arrayBuffer();
                const bytes = new Uint8Array(arrayBuffer.slice(0, 8));
                const isPNG = bytes[0] === 0x89 && bytes[1] === 0x50;
                const isJPEG = bytes[0] === 0xFF && bytes[1] === 0xD8;
                const isWebP = bytes[0] === 0x52 && bytes[1] === 0x49;
                const ext = isPNG ? 'png' : isJPEG ? 'jpg' : isWebP ? 'webp' : 'bin';

                const blob = new Blob([arrayBuffer], {
                    type: response.headers.get('content-type') || `image/${ext}`
                });

                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `pattern-${Date.now()}.${ext}`;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();

                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                }, 100);

                showToast(`下载成功 (${ext.toUpperCase()})`, 'success');
            } catch (error) {
                showToast('直接打开图片...', 'success');
                window.open(url, '_blank');
            }
        }

        async function downloadAllImages(images, prefix = '印花提取图片') {
            if (!images || images.length === 0) {
                showToast('没有可下载的图片', 'error');
                return;
            }

            const MAX_CONCURRENT = 5;
            const fileNameRegex = /[^\w\u4e00-\u9fa5]/g;

            async function downloadSingleImage(img, index) {
                const fileName = `${index}_${(img.title || `image_${index}`).replace(fileNameRegex, '_')}.png`;
                try {
                    const proxyUrl = `/api/download/proxy?url=${encodeURIComponent(img.url)}`;
                    const response = await fetch(proxyUrl, { method: 'GET' });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const blob = await response.blob();
                    return { success: true, fileName, blob, url: img.url };
                } catch (error) {
                    console.error(`下载失败: ${img.url}, 错误:`, error);
                    return { success: false, fileName, url: img.url, error };
                }
            }

            async function downloadWithConcurrency(items, concurrency) {
                const results = [];
                const executing = [];

                for (const item of items) {
                    const promise = downloadSingleImage(item.img, item.index).then(result => {
                        executing.splice(executing.indexOf(promise), 1);
                        return result;
                    });

                    results.push(promise);
                    executing.push(promise);

                    if (executing.length >= concurrency) {
                        await Promise.race(executing);
                    }
                }

                return Promise.all(results);
            }

            let zipUrl = null;
            const downloadItems = images.map((img, i) => ({ img, index: images.length - i }));

            try {
                showToast(`正在并行下载 ${images.length} 张图片...`, 'success');
                const downloadResults = await downloadWithConcurrency(downloadItems, MAX_CONCURRENT);

                const zip = new JSZip();
                let successCount = 0;
                let failCount = 0;
                let failedUrls = [];

                downloadResults.forEach(result => {
                    if (result.success) {
                        zip.file(result.fileName, result.blob);
                        successCount++;
                        console.log(`成功添加: ${result.fileName}`);
                    } else {
                        failCount++;
                        failedUrls.push(result.url);
                    }
                });

                if (successCount === 0) {
                    showToast('打包失败，所有图片都无法下载', 'error');
                    console.error('所有图片下载失败，失败的URL:', failedUrls);
                    return;
                }

                showToast('正在生成ZIP文件...', 'success');
                const content = await zip.generateAsync({ 
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });
                
                try {
                    zipUrl = window.URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = zipUrl;
                    a.download = `${prefix}_${new Date().toISOString().slice(0, 10)}.zip`;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                } catch (downloadError) {
                    console.error('下载触发失败:', downloadError);
                    showToast('下载失败，请重试', 'error');
                    return;
                } finally {
                    setTimeout(() => {
                        if (zipUrl) {
                            window.URL.revokeObjectURL(zipUrl);
                            zipUrl = null;
                        }
                    }, 200);
                }

                if (failCount > 0) {
                    console.warn(`部分图片下载失败 (${failCount}张):`, failedUrls);
                    showToast(`成功打包 ${successCount} 张图片，${failCount} 张失败`, 'warning');
                } else {
                    showToast(`成功打包 ${successCount} 张图片`, 'success');
                }
            } catch (error) {
                console.error('打包异常:', error);
                showToast('打包失败: ' + error.message, 'error');
            }
        }

        function downloadAll() {
            const images = currentTab === 'favorite' ? favoriteImages : allImages;
            const prefix = currentTab === 'favorite' ? '印花提取收藏' : '印花提取图片';
            downloadAllImages(images, prefix);
        }

        // ==================== 收藏功能 ====================
        function favoriteImage(url, title, ratio) {
            const isAlreadyFavorited = favoriteImages.some(img => img.url === url);
            if (isAlreadyFavorited) {
                showToast('该图片已在收藏中', 'error');
                return;
            }
            
            const imageData = {
                url: url,
                title: title || `印花提取 #${String(globalImageCounter).padStart(3, '0')}`,
                ratio: ratio || '1:1',
                timestamp: new Date().toLocaleString('zh-CN')
            };
            
            favoriteImages.unshift(imageData);
            localStorageCache.markDirty(STORAGE_KEY_FAVORITE);
            showToast('已收藏', 'success');
            
            if (currentTab === 'favorite') {
                renderGallery(favoriteImages);
            } else {
                renderGallery(allImages);
            }
        }

        function unfavoriteImage(url) {
            const initialLength = favoriteImages.length;
            favoriteImages = favoriteImages.filter(img => img.url !== url);
            localStorageCache.markDirty(STORAGE_KEY_FAVORITE);
            
            if (favoriteImages.length < initialLength) {
                showToast('已取消收藏', 'success');
                if (currentTab === 'favorite') {
                    renderGallery(favoriteImages);
                } else {
                    renderGallery(allImages);
                }
            }
        }

        // ==================== 删除图片功能 ====================
        function deleteImage(url) {
            allImages = allImages.filter(img => img.url !== url);
            favoriteImages = favoriteImages.filter(img => img.url !== url);
            localStorageCache.markDirty(STORAGE_KEY_ALL);
            localStorageCache.markDirty(STORAGE_KEY_FAVORITE);
            showToast('图片已删除', 'success');
            if (currentTab === 'favorite') {
                renderGallery(favoriteImages);
            } else {
                renderGallery(allImages);
            }
        }

        // ==================== 标签切换 ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                
                if (currentTab === 'all') {
                    renderGallery(allImages);
                } else {
                    renderGallery(favoriteImages);
                }
            });
        });

        // ==================== 渲染图片网格 ====================
        function renderGallery(images) {
            const galleryGrid = document.getElementById('galleryGrid');
            const galleryEmpty = document.getElementById('galleryEmpty');
            
            const loadingCards = Array.from(galleryGrid.querySelectorAll('.image-card.loading'));
            
            if (images.length === 0 && loadingCards.length === 0) {
                galleryGrid.style.display = 'none';
                galleryEmpty.style.display = 'flex';
            } else {
                galleryGrid.style.display = 'grid';
                galleryEmpty.style.display = 'none';
                
                galleryGrid.innerHTML = '';
                
                loadingCards.forEach(card => {
                    galleryGrid.appendChild(card);
                });
                
                images.forEach((img) => {
                    const ratioMap = {
                        '1:1': '1/1',
                        '3:4': '3/4',
                        '9:16': '9/16',
                        '16:9': '16/9'
                    };
                    const aspectRatio = ratioMap[img.ratio] || '1/1';
                    
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    
                    const isFavoriteTab = currentTab === 'favorite';
                    const isFavorited = favoriteImages.some(favImg => favImg.url === img.url);
                    
                    let favoriteButtonHTML;
                    if (isFavoriteTab) {
                        favoriteButtonHTML = `<button class="card-action-btn" onclick="unfavoriteImage('${img.url}')">取消收藏</button>`;
                    } else if (isFavorited) {
                        favoriteButtonHTML = `<button class="card-action-btn" style="background: linear-gradient(145deg, rgba(0, 214, 143, 0.3) 0%, rgba(0, 179, 119, 0.2) 100%); color: var(--primary); cursor: default;">已收藏</button>`;
                    } else {
                        favoriteButtonHTML = `<button class="card-action-btn" onclick="favoriteImage('${img.url}', '${img.title}', '${img.ratio}')">收藏</button>`;
                    }
                    
                    card.innerHTML = `
                        <div class="image-card-preview" style="aspect-ratio: ${aspectRatio}">
                            <img data-src="${img.url}" alt="${img.title}" loading="lazy" style="opacity: 0; transition: opacity 0.3s ease;">
                            <button class="image-card-delete" onclick="deleteImage('${img.url}')" title="删除"></button>
                            <div class="image-card-overlay">
                                <div class="image-card-actions">
                                    <button class="card-action-btn" onclick="downloadImage('${img.url}')">下载</button>
                                    ${favoriteButtonHTML}
                                </div>
                            </div>
                        </div>
                        <div class="image-card-info">
                            <div class="image-card-title">${img.title}</div>
                            <div class="image-card-meta">${img.timestamp}</div>
                        </div>
                    `;
                    galleryGrid.appendChild(card);
                    observeLazyImage(card.querySelector('img'));
                });
            }
        }

        // ==================== 清空功能 ====================
        function clearAll() {
            const targetName = currentTab === 'all' ? '全部图片' : '收藏图片';
            
            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            modal.innerHTML = `
                <div class="confirm-modal-overlay"></div>
                <div class="confirm-modal-content">
                    <div class="confirm-modal-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                    <div class="confirm-modal-title">确认清空</div>
                    <div class="confirm-modal-message">您确定要清空${targetName}吗？</div>
                    <div class="confirm-modal-buttons">
                        <button class="confirm-modal-btn cancel" id="modalCancel">取消</button>
                        <button class="confirm-modal-btn confirm" id="modalConfirm">确定</button>
                    </div>
                </div>
            `;
            
            const style = document.createElement('style');
            style.textContent = `
                .confirm-modal {
                    position: fixed;
                    inset: 0;
                    z-index: 9999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                .confirm-modal-overlay {
                    position: absolute;
                    inset: 0;
                    background: rgba(0, 0, 0, 0.7);
                    backdrop-filter: blur(4px);
                }
                .confirm-modal-content {
                    position: relative;
                    background: linear-gradient(145deg, #1a1a1a 0%, #141414 100%);
                    border: 1px solid #333;
                    border-radius: 16px;
                    padding: 32px;
                    text-align: center;
                    min-width: 320px;
                    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
                    animation: modalSlideIn 0.3s ease;
                }
                @keyframes modalSlideIn {
                    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
                    to { opacity: 1; transform: translateY(0) scale(1); }
                }
                .confirm-modal-icon { color: #faad14; margin-bottom: 16px; }
                .confirm-modal-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
                .confirm-modal-message { font-size: 14px; color: #a0a0a0; margin-bottom: 24px; line-height: 1.5; }
                .confirm-modal-buttons { display: flex; gap: 12px; justify-content: center; }
                .confirm-modal-btn {
                    padding: 10px 24px;
                    border-radius: 8px;
                    font-size: 14px;
                    font-weight: 500;
                    cursor: pointer;
                    transition: all 0.2s ease;
                    border: none;
                }
                .confirm-modal-btn.cancel { background: #262626; color: #a0a0a0; }
                .confirm-modal-btn.cancel:hover { background: #333; color: #fff; }
                .confirm-modal-btn.confirm {
                    background: linear-gradient(135deg, #ff4d4f 0%, #ff7875 100%);
                    color: #fff;
                }
                .confirm-modal-btn.confirm:hover {
                    background: linear-gradient(135deg, #ff7875 0%, #ff4d4f 100%);
                    transform: translateY(-1px);
                    box-shadow: 0 4px 12px rgba(255, 77, 79, 0.3);
                }
            `;
            
            document.head.appendChild(style);
            document.body.appendChild(modal);
            
            document.getElementById('modalCancel').addEventListener('click', () => {
                document.body.removeChild(modal);
                document.head.removeChild(style);
            });
            
            document.getElementById('modalConfirm').addEventListener('click', () => {
                const galleryGrid = document.getElementById('galleryGrid');
                const galleryEmpty = document.getElementById('galleryEmpty');
                
                // 设置清空标志，阻止后续生成任务添加图片
                isCleared = true;
                // 清空生成队列
                generationQueue.clear();
                // 清空图片预加载缓存
                imagePreloadCache.clear();
                
                if (currentTab === 'all') {
                    allImages = [];
                    localStorageCache.markDirty(STORAGE_KEY_ALL);
                    localStorageCache.forceFlush();
                    galleryGrid.innerHTML = '';
                    galleryEmpty.style.display = 'flex';
                    galleryGrid.style.display = 'none';
                    showToast('已清空全部图片');
                } else {
                    favoriteImages = [];
                    localStorageCache.markDirty(STORAGE_KEY_FAVORITE);
                    localStorageCache.forceFlush();
                    galleryGrid.innerHTML = '';
                    if (allImages.length === 0) {
                        galleryEmpty.style.display = 'flex';
                        galleryGrid.style.display = 'none';
                    } else {
                        currentTab = 'all';
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-tab="all"]').classList.add('active');
                        renderGallery(allImages);
                    }
                    showToast('已清空收藏图片');
                }
                
                // 延迟重置清空标志，允许新的生成任务
                setTimeout(() => {
                    isCleared = false;
                }, 500);
                
                document.body.removeChild(modal);
                document.head.removeChild(style);
            });
            
            modal.querySelector('.confirm-modal-overlay').addEventListener('click', () => {
                document.body.removeChild(modal);
                document.head.removeChild(style);
            });
            
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    document.body.removeChild(modal);
                    document.head.removeChild(style);
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
        }

        // ==================== 提示消息 ====================
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==================== 页面加载时渲染 ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderGallery(allImages);
        });
    </script>
</body>
