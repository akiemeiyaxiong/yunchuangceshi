        // ==================== 下载功能 ====================
        async function downloadImage(url) {
            try {
                showToast('开始下载...', 'success');
                const response = await fetch(url, { method: 'GET', mode: 'cors' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const arrayBuffer = await response.arrayBuffer();
                const bytes = new Uint8Array(arrayBuffer.slice(0, 8));
                const isPNG = bytes[0] === 0x89 && bytes[1] === 0x50;
                const isJPEG = bytes[0] === 0xFF && bytes[1] === 0xD8;
                const isWebP = bytes[0] === 0x52 && bytes[1] === 0x49;
                const ext = isPNG ? 'png' : isJPEG ? 'jpg' : isWebP ? 'webp' : 'bin';

                const blob = new Blob([arrayBuffer], {
                    type: response.headers.get('content-type') || `image/${ext}`
                });

                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `split-${Date.now()}.${ext}`;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();

                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                }, 100);

                showToast(`下载成功 (${ext.toUpperCase()})`, 'success');
            } catch (error) {
                showToast('直接打开图片...', 'success');
                window.open(url, '_blank');
            }
        }

        /**
         * 通过 Canvas 获取跨域图片的 Blob
         * @param {string} url - 图片 URL
         * @returns {Promise<Blob>} 图片 Blob
         */
        async function getImageBlobViaCanvas(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error('Canvas toBlob failed'));
                            }
                        }, 'image/png');
                    } catch (error) {
                        reject(error);
                    }
                };

                img.onerror = () => {
                    reject(new Error('Image load failed'));
                };

                img.src = url;
            });
        }

        /**
         * 打包下载所有图片
         * @param {Array} images - 图片数组
         * @param {string} prefix - 文件名前缀
         */
        async function downloadAllImages(images, prefix = '图片裂变') {
            if (!images || images.length === 0) {
                showToast('没有可下载的图片', 'error');
                return;
            }

            try {
                showToast('正在打包图片...', 'success');
                const zip = new JSZip();
                let successCount = 0;
                let failCount = 0;

                for (let i = 0; i < images.length; i++) {
                    const img = images[i];
                    const index = images.length - i;
                    const ratio = img.ratio || '1x1';
                    const fileName = `${index}_${ratio}_${img.title.replace(/[^\w\u4e00-\u9fa5]/g, '_')}.png`;

                    try {
                        // 首先尝试使用 Canvas 方式获取图片（解决 CORS 问题）
                        const blob = await getImageBlobViaCanvas(img.url);
                        zip.file(fileName, blob);
                        successCount++;
                    } catch (canvasError) {
                        // Canvas 方式失败，尝试直接 fetch
                        try {
                            const response = await fetch(img.url, { method: 'GET', mode: 'cors' });
                            if (response.ok) {
                                const blob = await response.blob();
                                zip.file(fileName, blob);
                                successCount++;
                            } else {
                                failCount++;
                            }
                        } catch (fetchError) {
                            failCount++;
                        }
                    }
                }

                if (successCount === 0) {
                    showToast('打包失败，无法下载图片', 'error');
                    return;
                }

                showToast('正在生成ZIP文件...', 'success');
                const content = await zip.generateAsync({ type: 'blob' });
                const zipUrl = window.URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = zipUrl;
                a.download = `${prefix}_${new Date().toISOString().slice(0, 10)}.zip`;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();

                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(zipUrl);
                }, 100);

                showToast(`成功打包 ${successCount} 张图片${failCount > 0 ? ` (${failCount} 张失败)` : ''}`, 'success');
            } catch (error) {
                showToast('打包失败，请重试', 'error');
            }
        }

        function downloadAll() {
            const images = currentTab === 'favorite' ? favoriteImages : allImages;
            const prefix = currentTab === 'favorite' ? '图片裂变收藏' : '图片裂变';
            downloadAllImages(images, prefix);
        }

        // ==================== 收藏功能 ====================
        function favoriteImage(url, title, ratio) {
            const isAlreadyFavorited = favoriteImages.some(img => img.url === url);
            if (isAlreadyFavorited) {
                showToast('该图片已在收藏中', 'error');
                return;
            }
            
            const imageData = {
                url: url,
                title: title || `图片裂变 #${String(globalImageCounter).padStart(3, '0')}`,
                ratio: ratio || '1:1',
                timestamp: new Date().toLocaleString('zh-CN')
            };
            
            favoriteImages.unshift(imageData);
            localStorage.setItem(STORAGE_KEY_FAVORITE, JSON.stringify(favoriteImages));
            showToast('已收藏', 'success');
            
            if (currentTab === 'favorite') {
                renderGallery(favoriteImages);
            } else {
                renderGallery(allImages);
            }
        }

        function unfavoriteImage(url) {
            const initialLength = favoriteImages.length;
            favoriteImages = favoriteImages.filter(img => img.url !== url);
            localStorage.setItem(STORAGE_KEY_FAVORITE, JSON.stringify(favoriteImages));
            
            if (favoriteImages.length < initialLength) {
                showToast('已取消收藏', 'success');
                if (currentTab === 'favorite') {
                    renderGallery(favoriteImages);
                } else {
                    renderGallery(allImages);
                }
            }
        }

        // ==================== 删除图片功能 ====================
        function deleteImage(url) {
            allImages = allImages.filter(img => img.url !== url);
            favoriteImages = favoriteImages.filter(img => img.url !== url);
            localStorage.setItem(STORAGE_KEY_ALL, JSON.stringify(allImages));
            localStorage.setItem(STORAGE_KEY_FAVORITE, JSON.stringify(favoriteImages));
            showToast('图片已删除', 'success');
            if (currentTab === 'favorite') {
                renderGallery(favoriteImages);
            } else {
                renderGallery(allImages);
            }
        }

        // ==================== 标签切换 ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                
                if (currentTab === 'all') {
                    renderGallery(allImages);
                } else {
                    renderGallery(favoriteImages);
                }
            });
        });

        // ==================== 渲染图片网格 ====================
        function renderGallery(images) {
            const galleryGrid = document.getElementById('galleryGrid');
            const galleryEmpty = document.getElementById('galleryEmpty');
            
            if (images.length === 0) {
                galleryGrid.style.display = 'none';
                galleryEmpty.style.display = 'flex';
            } else {
                galleryGrid.style.display = 'grid';
                galleryEmpty.style.display = 'none';
                
                galleryGrid.innerHTML = '';
                
                images.forEach((img) => {
                    const ratioMap = {
                        '1:1': '1/1',
                        '2:3': '2/3',
                        '3:4': '3/4',
                        '1:1-small': '1/1'
                    };
                    const aspectRatio = ratioMap[img.ratio] || '1/1';
                    
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    
                    const isFavoriteTab = currentTab === 'favorite';
                    const isFavorited = favoriteImages.some(favImg => favImg.url === img.url);
                    
                    let favoriteButtonHTML;
                    if (isFavoriteTab) {
                        favoriteButtonHTML = `<button class="card-action-btn" onclick="unfavoriteImage('${img.url}')">取消收藏</button>`;
                    } else if (isFavorited) {
                        favoriteButtonHTML = `<button class="card-action-btn" style="background: linear-gradient(145deg, rgba(0, 214, 143, 0.3) 0%, rgba(0, 179, 119, 0.2) 100%); color: var(--primary); cursor: default;">已收藏</button>`;
                    } else {
                        favoriteButtonHTML = `<button class="card-action-btn" onclick="favoriteImage('${img.url}', '${img.title}', '${img.ratio}')">收藏</button>`;
                    }
                    
                    card.innerHTML = `
                        <div class="image-card-preview" style="aspect-ratio: ${aspectRatio}">
                            <img src="${img.url}" alt="${img.title}" loading="lazy" onload="this.style.opacity='1'" style="opacity: 0; transition: opacity 0.3s ease;">
                            <button class="image-card-delete" onclick="deleteImage('${img.url}')" title="删除"></button>
                            <div class="image-card-overlay">
                                <div class="image-card-actions">
                                    <button class="card-action-btn" onclick="downloadImage('${img.url}')">下载</button>
                                    ${favoriteButtonHTML}
                                </div>
                            </div>
                        </div>
                        <div class="image-card-info">
                            <div class="image-card-title">
                                ${img.title}
                                <span class="ratio-badge">${img.ratio}</span>
                            </div>
                            <div class="image-card-meta">${img.timestamp}</div>
                        </div>
                    `;
                    galleryGrid.appendChild(card);
                });
            }
        }

        // ==================== 清空功能 ====================
        function clearAll() {
            const targetName = currentTab === 'all' ? '全部图片' : '收藏图片';
            
            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            modal.innerHTML = `
                <div class="confirm-modal-overlay"></div>
                <div class="confirm-modal-content">
                    <div class="confirm-modal-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                    <div class="confirm-modal-title">确认清空</div>
                    <div class="confirm-modal-message">您确定要清空${targetName}吗？</div>
                    <div class="confirm-modal-buttons">
                        <button class="confirm-modal-btn cancel" id="modalCancel">取消</button>
                        <button class="confirm-modal-btn confirm" id="modalConfirm">确定</button>
                    </div>
                </div>
            `;
            
            const style = document.createElement('style');
            style.textContent = `
                .confirm-modal {
                    position: fixed;
                    inset: 0;
                    z-index: 9999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                .confirm-modal-overlay {
                    position: absolute;
                    inset: 0;
                    background: rgba(0, 0, 0, 0.7);
                    backdrop-filter: blur(4px);
                }
                .confirm-modal-content {
                    position: relative;
                    background: linear-gradient(145deg, #1a1a1a 0%, #141414 100%);
                    border: 1px solid #333;
                    border-radius: 16px;
                    padding: 32px;
                    text-align: center;
                    min-width: 320px;
                    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
                    animation: modalSlideIn 0.3s ease;
                }
                @keyframes modalSlideIn {
                    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
                    to { opacity: 1; transform: translateY(0) scale(1); }
                }
                .confirm-modal-icon { color: #faad14; margin-bottom: 16px; }
                .confirm-modal-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
                .confirm-modal-message { font-size: 14px; color: #a0a0a0; margin-bottom: 24px; line-height: 1.5; }
                .confirm-modal-buttons { display: flex; gap: 12px; justify-content: center; }
                .confirm-modal-btn {
                    padding: 10px 24px;
                    border-radius: 8px;
                    font-size: 14px;
                    font-weight: 500;
                    cursor: pointer;
                    transition: all 0.2s ease;
                    border: none;
                }
                .confirm-modal-btn.cancel { background: #262626; color: #a0a0a0; }
                .confirm-modal-btn.cancel:hover { background: #333; color: #fff; }
                .confirm-modal-btn.confirm {
                    background: linear-gradient(135deg, #ff4d4f 0%, #ff7875 100%);
                    color: #fff;
                }
                .confirm-modal-btn.confirm:hover {
                    background: linear-gradient(135deg, #ff7875 0%, #ff4d4f 100%);
                    transform: translateY(-1px);
                    box-shadow: 0 4px 12px rgba(255, 77, 79, 0.3);
                }
            `;
            
            document.head.appendChild(style);
            document.body.appendChild(modal);
            
            document.getElementById('modalCancel').addEventListener('click', () => {
                document.body.removeChild(modal);
                document.head.removeChild(style);
            });
            
            document.getElementById('modalConfirm').addEventListener('click', () => {
                if (currentTab === 'all') {
                    allImages = [];
                    localStorage.setItem(STORAGE_KEY_ALL, JSON.stringify(allImages));
                    if (favoriteImages.length === 0) {
                        document.getElementById('galleryEmpty').style.display = 'flex';
                        document.getElementById('galleryGrid').style.display = 'none';
                    } else {
                        document.querySelector('[data-tab="favorite"]').click();
                    }
                    showToast('已清空全部图片');
                } else {
                    favoriteImages = [];
                    localStorage.setItem(STORAGE_KEY_FAVORITE, JSON.stringify(favoriteImages));
                    if (allImages.length === 0) {
                        document.getElementById('galleryEmpty').style.display = 'flex';
                        document.getElementById('galleryGrid').style.display = 'none';
                    } else {
                        document.querySelector('[data-tab="all"]').click();
                    }
                    showToast('已清空收藏图片');
                }
                
                document.body.removeChild(modal);
                document.head.removeChild(style);
            });
            
            modal.querySelector('.confirm-modal-overlay').addEventListener('click', () => {
                document.body.removeChild(modal);
                document.head.removeChild(style);
            });
            
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    document.body.removeChild(modal);
                    document.head.removeChild(style);
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
        }

        // ==================== 提示消息 ====================
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==================== 智能像素对齐使用示例 ====================
        
        /**
         * 示例：处理 API 生成的图片并调整为指定尺寸
         * 使用场景：用户生成图片后，需要精确像素尺寸（如 1440x1920）
         * 
         * @param {string} apiImageUrl - API 返回的图片 URL
         * @param {number} width - 目标宽度
         * @param {number} height - 目标高度
         */
        async function exampleProcessGeneratedImage(apiImageUrl, width, height) {
            showToast('正在智能分析图片主体...', 'info');
            
            try {
                // 使用智能处理器处理图片
                const result = await SmartImageProcessor.processImage(
                    apiImageUrl,
                    width,
                    height,
                    {
                        outputFormat: 'image/jpeg',
                        quality: 0.95,
                        returnType: 'all'
                    }
                );

                if (result.success) {
                    console.log('处理成功:', {
                        原始尺寸: result.originalSize,
                        目标尺寸: result.targetSize,
                        裁剪区域: result.cropInfo
                    });
                    
                    // 返回处理结果供后续使用
                    return result;
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('图片处理失败:', error);
                showToast('图片处理失败: ' + error.message, 'error');
                throw error;
            }
        }

        /**
         * 示例：批量处理多张图片为不同尺寸
         * 使用场景：一张图片需要生成多种规格（如电商多平台使用）
         * 
         * @param {string} imageUrl - 源图片 URL
         */
        async function exampleBatchProcess(imageUrl) {
            // 定义电商平台常用尺寸规格
            const platformSizes = [
                { name: '淘宝主图', width: 800, height: 800 },
                { name: '淘宝详情', width: 790, height: 1080 },
                { name: '京东主图', width: 800, height: 800 },
                { name: '拼多多主图', width: 750, height: 1000 },
                { name: '抖音封面', width: 1080, height: 1440 },
                { name: '小红书', width: 1080, height: 1440 },
                { name: '微信公众号', width: 900, height: 500 }
            ];

            // 构建批量处理任务
            const tasks = platformSizes.map(size => ({
                url: imageUrl,
                width: size.width,
                height: size.height,
                options: {
                    outputFormat: 'image/jpeg',
                    quality: 0.92
                }
            }));

            showToast(`开始批量处理 ${tasks.length} 张图片...`, 'info');

            // 执行批量处理
            const results = await SmartImageProcessor.batchProcess(
                tasks,
                (completed, total) => {
                    showToast(`处理进度: ${completed}/${total}`, 'info');
                }
            );

            // 打包下载所有处理后的图片
            const zip = new JSZip();
            results.forEach((result, index) => {
                if (result.success && result.base64) {
                    const base64Data = result.base64.split(',')[1];
                    const fileName = `${platformSizes[index].name}_${platformSizes[index].width}x${platformSizes[index].height}.jpg`;
                    zip.file(fileName, base64Data, { base64: true });
                }
            });

            // 生成并下载 ZIP 文件
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const zipUrl = URL.createObjectURL(zipBlob);
            const link = document.createElement('a');
            link.href = zipUrl;
            link.download = '智能裁剪图片包.zip';
            link.click();
            URL.revokeObjectURL(zipUrl);

            showToast('批量处理完成！', 'success');
            return results;
        }

        /**
         * 示例：下载指定尺寸的裁剪图片
         * @param {string} imageUrl - 图片 URL
         * @param {number} width - 目标宽度
         * @param {number} height - 目标高度
         * @param {string} filename - 下载文件名
         */
        async function exampleDownloadResizedImage(imageUrl, width, height, filename) {
            const result = await SmartImageProcessor.processImage(
                imageUrl,
                width,
                height,
                { returnType: 'all' }
            );

            if (result.success) {
                SmartImageProcessor.downloadImage(result, filename);
                showToast(`已下载 ${width}x${height} 规格图片`, 'success');
            }
        }

        // ==================== 页面加载时渲染 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // 验证用户登录状态
            const isLoggedIn = await verifyUser();
            if (!isLoggedIn) {
                console.warn('用户未登录，部分功能可能受限');
            }

            // 加载用户API密钥
            await loadUserApiKeys();

            renderGallery(allImages);

            // 将智能处理器挂载到全局，方便在控制台测试
            window.SmartImageProcessor = SmartImageProcessor;
            console.log('智能像素对齐模块已加载，可通过 window.SmartImageProcessor 访问');
        });
    </script>
